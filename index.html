<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Benton | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div id="terminal-icon" title="Open Terminal">
        <i class="fas fa-terminal"></i>
    </div>

    <div id="terminal-window" class="hidden">
        <div id="terminal-header">
            <span>bash — ethanbenton@portfolio</span>
            <button id="close-terminal">X</button>
        </div>
        <div id="terminal-body">
            <div id="terminal-output">Welcome to EthanBentonOS v1.0.0. Type 'help' to begin.</div>
            <div id="input-line">
                <span id="prompt">ethanbenton@portfolio:~$</span>
                <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <div id="email-container">
        <a id="email-link" href="mailto:ethanfbenton@gmail.com"></a>
    </div>

    <div id="social-container">
        <div id="social-links"></div>
    </div>

    <div id="resume-container">
        <a id="resume-link" href="assets/EthanBentonResume.pdf" target="_blank"></a>
    </div>

    <nav id="navbar">
        <div id="nav-links"></div>
    </nav>

    <section id="hero">
        <div id="hero-content">
            <h1 id="hero-name"></h1>
            <p id="hero-title"></p>
        </div>
        <div class="scene">
            <div class="cube" id="cube">
                <div class="face front">HOME</div>
                <div class="face back">GITHUB</div>
                <div class="face right">PROJECTS</div>
                <div class="face left">SKILLS</div>
                <div class="face top">DEV</div>
                <div class="face bottom">INFO</div>
            </div>
        </div>
    </section>

    <section id="about" class="content-block"><h2>[ ABOUT ]</h2></section>
    <section id="education" class="content-block"><h2>[ EDUCATION ]</h2></section>
    <section id="work" class="content-block"><h2>[ WORK ]</h2></section>
    <section id="contact" class="content-block"><h2>[ CONTACT ]</h2></section>

    <script src="js/index.js"></script>
</body>
</html>
